# Training + eval watcher as a SkyPilot JobGroup.
# TODO: git clone below requires the repo to be public. Until then, use
#       file_mounts to sync local source (see /tmp/ac2-gpu-test.yaml pattern).
#
#   sky jobs launch ergon_infra/ergon_infra/templates/train-with-eval.yaml -y \
#     --env DEFINITION_ID=<uuid> \
#     --env MODEL=Qwen/Qwen2.5-7B \
#     --env BENCHMARK=gdpeval

name: ergon-rl-full
execution: parallel

---
name: trainer
resources:
  accelerators: ${GPU_TYPE:-A100}:${GPU_COUNT:-4}
  infra: shadeform

file_mounts:
  /checkpoints:
    source: ${CHECKPOINT_BUCKET:-s3://my-ergon-checkpoints}
    mode: MOUNT_CACHED

envs:
  DEFINITION_ID:
  MODEL:
  BENCHMARK: ${BENCHMARK:-smoke-test}

setup: |
  git clone https://github.com/DeepFlow-research/ergon.git /tmp/ergon
  cd /tmp/ergon
  pip install -e ./ergon_core -e ./ergon_builtins -e ./ergon_cli -e ./ergon_infra
  pip install "trl[vllm]>=1.0.0,<2.0.0" datasets transformers

run: |
  ergon train local \
    --benchmark "$BENCHMARK" \
    --definition-id "$DEFINITION_ID" \
    --model "$MODEL" \
    --vllm-mode server \
    --output-dir /checkpoints \
    --save-steps "${SAVE_STEPS:-50}"

---
name: eval-watcher
resources:
  cpus: 8
  infra: shadeform

file_mounts:
  /checkpoints:
    source: ${CHECKPOINT_BUCKET:-s3://my-ergon-checkpoints}
    mode: MOUNT

envs:
  BENCHMARK:
  EVALUATOR: ${EVALUATOR:-stub-rubric}

setup: |
  git clone https://github.com/DeepFlow-research/ergon.git /tmp/ergon
  cd /tmp/ergon
  pip install -e ./ergon_core -e ./ergon_builtins -e ./ergon_cli
  pip install "skypilot-nightly[shadeform]"

run: |
  ergon eval watch \
    --checkpoint-dir /checkpoints \
    --benchmark "$BENCHMARK" \
    --evaluator "$EVALUATOR" \
    --poll-interval "${POLL_INTERVAL:-120}" \
    --on-checkpoint "sky launch ergon_infra/ergon_infra/templates/eval-only.yaml -y --env CHECKPOINT={path} --env BENCHMARK=$BENCHMARK"
