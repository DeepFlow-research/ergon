# On-demand checkpoint evaluation.
# TODO: git clone below requires the repo to be public. Until then, use
#       file_mounts to sync local source (see /tmp/ac2-gpu-test.yaml pattern).
#
# Spawned by the eval watcher per checkpoint.
#
#   sky launch ergon_infra/ergon_infra/templates/eval-only.yaml -y \
#     --env CHECKPOINT=s3://bucket/checkpoint-500 \
#     --env BENCHMARK=gdpeval

name: ergon-eval

resources:
  accelerators: ${GPU_TYPE:-A100}:1
  infra: shadeform

envs:
  CHECKPOINT:
  BENCHMARK:
  EVALUATOR: ${EVALUATOR:-stub-rubric}
  EVAL_LIMIT: ${EVAL_LIMIT:-50}

setup: |
  git clone https://github.com/DeepFlow-research/ergon.git /tmp/ergon
  cd /tmp/ergon
  pip install -e ./ergon_core -e ./ergon_builtins -e ./ergon_cli
  pip install vllm

run: |
  python -m vllm.entrypoints.openai.api_server \
    --model "$CHECKPOINT" \
    --port 8000 &

  for i in $(seq 1 60); do
    if curl -s http://localhost:8000/health > /dev/null 2>&1; then
      echo "vLLM ready after ${i}s"
      break
    fi
    sleep 1
  done

  ergon benchmark run "$BENCHMARK" \
    --model "vllm:http://localhost:8000" \
    --evaluator "$EVALUATOR" \
    --limit "$EVAL_LIMIT"
