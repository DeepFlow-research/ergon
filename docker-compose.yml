version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: h_arcane
      POSTGRES_PASSWORD: h_arcane_dev
      POSTGRES_DB: h_arcane
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script creates h_arcane_test database alongside h_arcane
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h_arcane"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://h_arcane:h_arcane_dev@postgres:5432/h_arcane
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source code for hot-reload during development
      - ./h_arcane:/app/h_arcane
      - ./scripts:/app/scripts
      - ./paper_code_structure_plans/data:/app/paper_code_structure_plans/data
      - ./data:/app/data
      - ./config:/app/config
      # Mount pyproject.toml to reinstall dependencies if changed
      - ./pyproject.toml:/app/pyproject.toml
  
  inngest-dev:
    image: inngest/inngest:latest
    command: inngest dev --no-discovery -u http://api:9000/api/inngest
    ports:
      - "8289:8288"
    environment:
      - INNGEST_DEV=1
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:

