services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: h_arcane
      POSTGRES_PASSWORD: h_arcane_dev
      POSTGRES_DB: h_arcane
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h_arcane"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - ARCANE_DATABASE_URL=postgresql://h_arcane:h_arcane_dev@postgres:5432/h_arcane
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
      - OTEL_TRACES_ENABLED=false
      - OTEL_SERVICE_NAME=h-arcane
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uvicorn h_arcane.core.api.app:app --host 0.0.0.0 --port 9000 --reload
      --reload-dir /app/h_arcane --reload-dir /app/arcane_builtins"
    volumes:
      - ./h_arcane:/app/h_arcane
      - ./arcane_builtins:/app/arcane_builtins
      - ./data:/app/data

  dashboard:
    build:
      context: ./arcane-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - ARCANE_API_BASE_URL=http://api:9000
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
      - WATCHPACK_POLLING=true
    depends_on:
      - inngest-dev
      - api
    command: pnpm dev
    volumes:
      - ./arcane-dashboard:/app
      - /app/node_modules
      - /app/.next

  inngest-dev:
    image: inngest/inngest:latest
    command: >
      inngest dev --no-discovery
      -u http://api:9000/api/inngest
      -u http://dashboard:3000/api/inngest
    ports:
      - "8289:8288"
    environment:
      - INNGEST_DEV=1
    depends_on:
      api:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
