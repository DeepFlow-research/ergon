services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ergon
      POSTGRES_PASSWORD: ergon_dev
      POSTGRES_DB: ergon
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ergon"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - ERGON_DATABASE_URL=postgresql://ergon:ergon_dev@postgres:5432/ergon
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
      - OTEL_TRACES_ENABLED=false
      - OTEL_SERVICE_NAME=ergon-core
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uvicorn ergon_core.core.api.app:app --host 0.0.0.0 --port 9000 --reload
      --reload-dir /app/ergon_core --reload-dir /app/ergon_builtins"
    volumes:
      - ./ergon_core:/app/ergon_core
      - ./ergon_builtins:/app/ergon_builtins
      - ./data:/app/data

  dashboard:
    build:
      context: ./ergon-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - ERGON_API_BASE_URL=http://api:9000
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
      - WATCHPACK_POLLING=true
    depends_on:
      - inngest-dev
      - api
    command: pnpm dev
    volumes:
      - ./ergon-dashboard:/app
      - /app/node_modules
      - /app/.next

  inngest-dev:
    image: inngest/inngest:latest
    command: >
      inngest dev --no-discovery
      -u http://api:9000/api/inngest
      -u http://dashboard:3000/api/inngest
    ports:
      - "8289:8288"
    environment:
      - INNGEST_DEV=1
    depends_on:
      api:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4317"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16687:16686"
      - "4320:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
