# docker-compose.real-llm.yml
#
# Full stack overlay for the real-LLM pytest tier at tests/real_llm/.
#
# Why a third overlay alongside docker-compose.yml and docker-compose.ci.yml:
#
#   docker-compose.yml      — interactive dev (host-mounted source, debug ports)
#   docker-compose.ci.yml   — headless backend CI (no dashboard, no test harness;
#                             frontend runs against a mock in its own job)
#   docker-compose.real-llm.yml (this file) — real-LLM debug harness stack
#
# The real-LLM tier specifically needs two things neither other overlay
# provides:
#
#   1. A running dashboard (port 3101) so Playwright can drive the UI and
#      assert cohort/run state end-to-end. Booting the Next.js dev server
#      costs ~60s; we don't want that in the backend CI loop, which is why
#      docker-compose.ci.yml omits it.
#
#   2. The test harness API (ENABLE_TEST_HARNESS=1 + TEST_HARNESS_SECRET),
#      which exposes the /api/test/read/* endpoints that
#      tests/real_llm/fixtures/harness_client.py polls. We never want these
#      endpoints enabled in backend CI or dev; keeping them gated to this
#      overlay makes that explicit.
#
# If either of those constraints changes (backend CI starts running
# Playwright too, or the harness endpoints become safe everywhere), this
# overlay can collapse back into docker-compose.ci.yml.
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ergon
      POSTGRES_PASSWORD: ergon
      POSTGRES_DB: ergon
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ergon"]
      interval: 2s
      timeout: 3s
      retries: 10

  inngest:
    image: inngest/inngest:latest
    command: >
      inngest dev --no-discovery
      -u http://api:9000/api/inngest
    ports: ["8288:8288"]
    environment:
      - INNGEST_DEV=1

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ERGON_DATABASE_URL=postgresql://ergon:ergon@postgres:5432/ergon
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest:8288
      - ENABLE_TEST_HARNESS=1
      - TEST_HARNESS_SECRET=real-llm-secret
      - ERGON_API_BASE_URL=http://api:9000
      - OTEL_TRACES_ENABLED=false
      - E2B_API_KEY=${E2B_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["9000:9000"]
    command: uvicorn ergon_core.core.api.app:app --host 0.0.0.0 --port 9000

  dashboard:
    build:
      context: ergon-dashboard
      dockerfile: Dockerfile
    environment:
      - ERGON_API_BASE_URL=http://api:9000
      - NEXT_PUBLIC_ENABLE_TEST_HARNESS=1
    depends_on:
      - api
    ports: ["3101:3000"]
    command: pnpm run dev
