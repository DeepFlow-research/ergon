name: E2E Benchmarks

on:
  pull_request:
    paths:
      - "h_arcane/**"
      - "arcane_builtins/**"
      - "arcane_cli/**"
      - "tests/e2e/**"
      - "docker-compose.ci.yml"
      - "Dockerfile"
  workflow_dispatch:

jobs:
  e2e-stubbed:
    name: "Stubbed benchmarks (no API keys)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Start CI stack
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Inngest sync
        run: |
          echo "Waiting for Inngest to sync functions..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1; then
              echo "Inngest dev server responding"
              break
            fi
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
      - name: Install project
        run: uv sync --frozen

      - name: Run stubbed E2E tests
        env:
          ARCANE_DATABASE_URL: postgresql://h_arcane:ci_test@localhost:5433/h_arcane
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
        run: uv run pytest tests/e2e/test_benchmarks_stubbed.py::TestStubbedBenchmarks -v --timeout=180

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  e2e-sandbox:
    name: "E2B sandbox I/O tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'e2e-sandbox')
    steps:
      - uses: actions/checkout@v4

      - name: Start CI stack
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Inngest sync
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1 && break
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
      - name: Install project
        run: uv sync --frozen

      - name: Run sandbox E2E tests
        env:
          ARCANE_DATABASE_URL: postgresql://h_arcane:ci_test@localhost:5433/h_arcane
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: uv run pytest tests/e2e/test_benchmarks_stubbed.py::TestE2BSandboxBenchmarks -v --timeout=180

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
