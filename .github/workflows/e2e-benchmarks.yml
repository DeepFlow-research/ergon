name: E2E Benchmarks

on:
  pull_request:
    paths:
      - "ergon_core/**"
      - "ergon_builtins/**"
      - "ergon_cli/**"
      - "ergon_infra/**"
      - "tests/e2e/**"
      - "docker-compose.ci.yml"
      - "Dockerfile"
  workflow_dispatch:

jobs:
  e2e-stubbed:
    name: "Stubbed benchmarks (no API keys)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Start CI stack
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Inngest sync
        run: |
          echo "Waiting for Inngest to sync functions..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1; then
              echo "Inngest dev server responding"
              break
            fi
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Install project
        run: uv sync --frozen --all-packages

      - name: Run stubbed E2E tests
        env:
          ERGON_DATABASE_URL: postgresql://ergon:ci_test@localhost:5433/ergon
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
        run: uv run pytest tests/e2e/test_benchmarks_stubbed.py::TestStubbedBenchmarks -v --timeout=180

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  e2e-sandbox:
    name: "E2B sandbox I/O tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'feature/')
    steps:
      - uses: actions/checkout@v4

      - name: Prepare shared blob root
        # Bind-mounted at the same path on host and inside the api container
        # so pytest can read the files the publisher writes.  World-writable
        # because the container runs as a different UID than the runner.
        run: |
          sudo mkdir -p /tmp/ergon-blob
          sudo chmod 777 /tmp/ergon-blob

      - name: Start CI stack
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Inngest sync
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1 && break
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Install project
        run: uv sync --frozen --all-packages

      - name: Run sandbox E2E tests
        env:
          ERGON_DATABASE_URL: postgresql://ergon:ci_test@localhost:5433/ergon
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          ERGON_BLOB_ROOT: /tmp/ergon-blob
        # --timeout=600 (per-test) is a safety net against a hung E2B
        # sandbox or pending Inngest event; actual CI run-time for this
        # suite is <60s. A per-test limit (rather than no limit) gives us
        # a clean pytest error with stacks when something hangs, instead
        # of the opaque 6-hour GitHub-Actions job cancel.
        run: |
          uv run pytest tests/e2e/test_benchmarks_stubbed.py::TestE2BSandboxBenchmarks -v --timeout=600
          uv run pytest tests/e2e/test_researchrubrics_smoke_e2b.py::TestResearchRubricsSmokeE2B -v --timeout=600

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
