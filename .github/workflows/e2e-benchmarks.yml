name: E2E Benchmarks

# Expensive: spins up the full docker-compose stack + burns real LLM and
# E2B sandbox credits.  Explicitly does NOT run on every push.
#
# Trigger posture (answers "how do we make PRs gated on this check
# without re-running it on every commit?"):
#   - pull_request types: [opened, reopened, labeled] — runs ONCE when a
#     PR is opened.  Notably absent: `synchronize`, which is the event
#     fired on every push to a PR.  Drop that and pushes stop retriggering.
#   - labeled + `run-e2e` — the manual "re-run after a big push" knob.
#     Add / remove / re-add the label on the PR to force another run
#     without needing the Actions UI.
#   - workflow_dispatch — ad-hoc manual runs from the Actions UI.
#
# Pair this with branch protection configured in GitHub UI:
#   Settings → Branches → main →
#     [x] Require status checks to pass before merging
#     [x] Select e2e-researchrubrics-demo / e2e-minif2f-demo
#     [ ] Require branches to be up to date before merging  <-- KEY
# With "up to date" OFF, the single run on PR-opening is enough to unblock
# merge.  If you push 50 more commits after that, the check stays green
# against the initial SHA and the merge button stays enabled.
on:
  pull_request:
    types: [opened, reopened, labeled]
    paths:
      - "ergon_core/**"
      - "ergon_builtins/**"
      - "ergon_cli/**"
      - "ergon_infra/**"
      - "tests/e2e/**"
      - "docker-compose.ci.yml"
      - "Dockerfile"
      - ".github/workflows/e2e-benchmarks.yml"
  workflow_dispatch:

jobs:
  e2e-researchrubrics-demo:
    name: "ResearchRubrics demo (real sandbox + LLM)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Gate: run on PR open / reopen, on `run-e2e` label adds (re-run
    # knob), and on manual dispatch.  Critically we do NOT run on
    # `synchronize` — that's the per-push event that was burning credits.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        (github.event.action == 'opened' ||
         github.event.action == 'reopened' ||
         (github.event.action == 'labeled' &&
          github.event.label.name == 'run-e2e')))
    # Job-level env so both `docker compose up` (for interpolation into
    # the api container) and the pytest step see the same values.  The
    # alternative — setting them only on the pytest step — meant the
    # worker ReAct loop inside the api container had no OPENAI_API_KEY
    # and crashed on `tests/e2e/test_benchmarks_stubbed.py::TestMiniF2FDemo`
    # (see run 24578046124).
    env:
      E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_BASE_URL: https://openrouter.ai/api/v1
      # gpt-4o-mini via OpenRouter: $0.15 / $0.60 per 1M tokens,
      # reliable tool-calling, well-established.  If tool-calling
      # quality on these tasks proves marginal, try
      # `openai:anthropic/claude-3.5-haiku` (stronger reasoning at
      # $0.80/$4.00) or `openai:google/gemini-2.0-flash-001`
      # (cheapest current-gen at $0.10/$0.40).
      ERGON_MODEL: openai:openai/gpt-4o-mini
      ERGON_BLOB_ROOT: /tmp/ergon-blob
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Prepare shared blob root
        # Bind-mounted at the same path on host and inside the api container
        # so pytest can read the files the publisher writes.  World-writable
        # because the container runs as a different UID than the runner.
        run: |
          sudo mkdir -p /tmp/ergon-blob
          sudo chmod 777 /tmp/ergon-blob

      - name: Start CI stack
        # docker-compose.ci.yml interpolates OPENAI_API_KEY, OPENAI_BASE_URL,
        # ERGON_MODEL (and E2B_API_KEY) from this step's env into the api
        # container.  Job-level env (above) makes them available here.
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Inngest sync
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1 && break
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Install project
        run: uv sync --frozen --all-packages

      - name: Run researchrubrics demo E2E
        env:
          # Only the host-facing vars need to override job-level defaults
          # here.  LLM credentials (OPENAI_API_KEY / OPENAI_BASE_URL /
          # ERGON_MODEL) and sandbox/E2B/blob root come from job-level env.
          ERGON_DATABASE_URL: postgresql://ergon:ci_test@localhost:5433/ergon
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
        # --timeout=600 per-test is a safety net against a hung E2B
        # sandbox or pending Inngest event; actual run-time for this
        # suite is a couple of minutes. Per-test limit (rather than no
        # limit) surfaces clean pytest errors with stacks instead of
        # the opaque 6-hour GitHub-Actions job cancel.
        run: uv run pytest tests/e2e/test_benchmarks_stubbed.py::TestResearchRubricsDemo -v --timeout=600

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  e2e-minif2f-demo:
    name: "MiniF2F demo (real Lean sandbox + LLM)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Same trigger gate as the researchrubrics job — see its comment.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        (github.event.action == 'opened' ||
         github.event.action == 'reopened' ||
         (github.event.action == 'labeled' &&
          github.event.label.name == 'run-e2e')))
    # Same env posture as the researchrubrics job — see its block for
    # why we hoist LLM credentials to job-level (docker-compose needs
    # them at `up` time to interpolate into the api container).
    env:
      E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_BASE_URL: https://openrouter.ai/api/v1
      ERGON_MODEL: openai:openai/gpt-4o-mini
      ERGON_BLOB_ROOT: /tmp/ergon-blob
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Prepare shared blob root
        run: |
          sudo mkdir -p /tmp/ergon-blob
          sudo chmod 777 /tmp/ergon-blob

      - name: Start CI stack
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Inngest sync
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1 && break
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Install project
        run: uv sync --frozen --all-packages

      - name: Run minif2f demo E2E
        env:
          # Host-facing vars only; LLM credentials come from job-level env.
          ERGON_DATABASE_URL: postgresql://ergon:ci_test@localhost:5433/ergon
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
        # --timeout=900 per-test: Lean sandbox boot + manager→prover→
        # compile takes longer than the researchrubrics demo; actual
        # run-time is 3-5 min. Per-test limit gives clean pytest errors
        # instead of the opaque 6-hour GitHub-Actions cancel.
        run: uv run pytest tests/e2e/test_benchmarks_stubbed.py::TestMiniF2FDemo -v --timeout=900

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
