name: CI Fast

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-type-check:
    name: "Lint + type-check (Python)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: "Install project (workspace + dev tools: slopcop from PyPI)"
        run: uv sync --frozen --all-packages --group dev

      - name: Ruff check
        run: uv run ruff check ergon_core ergon_builtins ergon_cli ergon_infra tests scripts

      - name: Ruff format check
        run: uv run ruff format --check ergon_core ergon_builtins ergon_cli ergon_infra tests scripts

      - name: Type check (ty)
        run: uv run ty check ergon_core ergon_builtins ergon_cli ergon_infra

      - name: slopcop check
        run: uv run slopcop ergon_core ergon_builtins ergon_cli ergon_infra

      - name: Cyclomatic complexity check (xenon)
        # Thresholds reflect current baseline; tighten as complexity debt is paid down.
        # F/E/C = max-absolute/max-modules/max-average. Radon grades: A(1-5) B(6-10) C(11-15) D(16-20) E(21-25) F(26+)
        run: uv run xenon --max-absolute F --max-modules E --max-average C ergon_core ergon_builtins ergon_cli ergon_infra

  frontend-checks:
    name: "Lint + type-check (Frontend)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: ergon-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C ergon-dashboard install --frozen-lockfile

      - name: ESLint
        run: pnpm -C ergon-dashboard run lint

      - name: TypeScript check
        run: pnpm -C ergon-dashboard run typecheck

  unit-tests:
    name: "Unit + state tests (Python)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Install project
        run: uv sync --frozen --all-packages --group dev

      - name: Run fast test suites with coverage
        env:
          ERGON_DATABASE_URL: "sqlite:///test.db"
          # Python 3.12+ sys.monitoring backend — faster than the default
          # sys.settrace() tracer for ORM-heavy workloads like SQLAlchemy.
          COVERAGE_CORE: sysmon
        # pytest-xdist parallelises across runner cores. `--dist=loadfile`
        # keeps all tests in a single file on one worker, which matches the
        # module-scoped engine fixture in tests/state/conftest.py.
        run: uv run pytest tests/state -n auto --dist=loadfile --cov=ergon_core --cov=ergon_builtins --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  integration-tests:
    name: "Integration tests (Python)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Start CI stack
        run: docker compose -f docker-compose.ci.yml up -d --build --wait
        timeout-minutes: 10

      - name: Wait for Inngest sync
        run: |
          echo "Waiting for Inngest to sync functions..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8289/v1/events/test > /dev/null 2>&1; then
              echo "Inngest dev server responding"
              break
            fi
            sleep 2
          done
          sleep 5

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Install project
        run: uv sync --frozen --all-packages --group dev

      - name: Run integration tests
        env:
          ERGON_DATABASE_URL: postgresql://ergon:ci_test@localhost:5433/ergon
          INNGEST_API_BASE_URL: http://localhost:8289
          INNGEST_DEV: "1"
          INNGEST_EVENT_KEY: dev
        run: uv run pytest tests/integration -v --timeout=300

      - name: Dump API logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api --tail 200

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
