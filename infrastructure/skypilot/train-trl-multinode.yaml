# Multi-node TRL GRPO training with Arcane environments.
#
# Node 0 runs `trl vllm-serve` (inference).
# Node 1+ runs `accelerate launch` (training with DeepSpeed ZeRO-3).
# Weight sync between training and vLLM happens via NCCL automatically.
#
# Example (2 nodes, 1 GPU each — cheap topology test):
#
#   sky launch infrastructure/skypilot/train-trl-multinode.yaml -y \
#     --env DEFINITION_ID=<uuid> \
#     --env MODEL=Qwen/Qwen2.5-1.5B \
#     --env ARCANE_INNGEST_URL=http://<tailscale-ip>:8288 \
#     --env DATABASE_URL=postgresql://...
#
# Example (2 nodes, 8 GPUs each — production):
#
#   sky launch infrastructure/skypilot/train-trl-multinode.yaml -y \
#     --env DEFINITION_ID=<uuid> \
#     --env MODEL=Qwen/Qwen2.5-72B \
#     --env GPU_TYPE=H100 --env GPU_COUNT=8 \
#     --env ARCANE_INNGEST_URL=http://<tailscale-ip>:8288 \
#     --env DATABASE_URL=postgresql://...

name: arcane-training-multinode

resources:
  accelerators: ${GPU_TYPE:-A10G}:${GPU_COUNT:-1}
  infra: shadeform
num_nodes: ${NUM_NODES:-2}

file_mounts:
  /checkpoints:
    source: ${CHECKPOINT_BUCKET:-s3://my-arcane-checkpoints}
    mode: MOUNT_CACHED

envs:
  DEFINITION_ID:
  MODEL:
  ARCANE_INNGEST_URL:
  DATABASE_URL:
  INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-dev}
  VLLM_TP_SIZE: ${VLLM_TP_SIZE:-1}
  SAVE_STEPS: ${SAVE_STEPS:-50}
  NUM_GENERATIONS: ${NUM_GENERATIONS:-4}
  LEARNING_RATE: ${LEARNING_RATE:-1e-5}
  TIMEOUT: ${TIMEOUT:-300}

setup: |
  git clone https://github.com/DeepFlow-research/arcane-extension.git /tmp/arcane
  cd /tmp/arcane
  pip install -e ./h_arcane -e ./arcane_builtins -e ./arcane_cli -e ./arcane_infra
  pip install "trl[vllm]>=1.0.0,<2.0.0" datasets transformers

run: |
  HEAD_IP=$(echo "$SKYPILOT_NODE_IPS" | head -n1)

  if [ "$SKYPILOT_NODE_RANK" = "0" ]; then
    echo "Node 0: starting vLLM serve (model=$MODEL, tp=$VLLM_TP_SIZE)"
    trl vllm-serve \
      --model "$MODEL" \
      --tensor_parallel_size "$VLLM_TP_SIZE" \
      --host 0.0.0.0 \
      --port 8000
  else
    echo "Node $SKYPILOT_NODE_RANK: waiting for vLLM on $HEAD_IP:8000..."
    for i in $(seq 1 180); do
      if curl -s "http://$HEAD_IP:8000/health" > /dev/null 2>&1; then
        echo "vLLM ready after ${i}s"
        break
      fi
      sleep 1
    done

    cd /tmp/arcane
    python scripts/train_trl_grpo.py \
      --definition-id "$DEFINITION_ID" \
      --model "$MODEL" \
      --vllm-mode server \
      --vllm-server-url "http://$HEAD_IP:8000" \
      --inngest-url "$ARCANE_INNGEST_URL" \
      --inngest-event-key "$INNGEST_EVENT_KEY" \
      --db-url "$DATABASE_URL" \
      --output-dir /checkpoints \
      --save-steps "$SAVE_STEPS" \
      --num-generations "$NUM_GENERATIONS" \
      --learning-rate "$LEARNING_RATE" \
      --timeout "$TIMEOUT"
  fi
