services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: h_arcane
      POSTGRES_PASSWORD: ci_test
      POSTGRES_DB: h_arcane
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h_arcane"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - ARCANE_DATABASE_URL=postgresql://h_arcane:ci_test@postgres:5432/h_arcane
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
      - E2B_API_KEY=${E2B_API_KEY:-}
      - OTEL_TRACES_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn h_arcane.core.api.app:app --host 0.0.0.0 --port 9000

  inngest-dev:
    image: inngest/inngest:latest
    command: >
      inngest dev --no-discovery
      -u http://api:9000/api/inngest
    ports:
      - "8289:8288"
    environment:
      - INNGEST_DEV=1
    depends_on:
      api:
        condition: service_started
