services:
  postgres:
    # Keep tag-pinned to 15 (major version). Follow-up: pin to a specific
    # digest once a maintainer can grab one via:
    #   docker pull postgres:15 && docker image inspect \
    #     --format='{{index .RepoDigests 0}}' postgres:15
    image: postgres:15
    environment:
      POSTGRES_USER: ergon
      POSTGRES_PASSWORD: ci_test
      POSTGRES_DB: ergon
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ergon"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      # BuildKit GHA cache: CI passes these through via buildx bake/build.
      # Local developers get a no-op (type=gha is only honoured when the
      # buildx GHA-cache endpoints are present, which GitHub Actions sets
      # automatically). No local setup required.
      cache_from:
        - type=gha,scope=ergon-api
      cache_to:
        - type=gha,scope=ergon-api,mode=max
    image: ergon-api:ci
    ports:
      - "9000:9000"
    environment:
      - ERGON_DATABASE_URL=postgresql://ergon:ci_test@postgres:5432/ergon
      - INNGEST_DEV=1
      - INNGEST_EVENT_KEY=dev
      - INNGEST_API_BASE_URL=http://inngest-dev:8288
      - E2B_API_KEY=${E2B_API_KEY:-}
      - OTEL_TRACES_ENABLED=false
      # Share blob root with host so pytest can read the files the
      # SandboxResourcePublisher writes from inside the container.  The
      # bind mount uses the same path on both sides so the DB-stored
      # ``file_path`` (computed from ``ERGON_BLOB_ROOT``) is resolvable
      # from host and container.
      - ERGON_BLOB_ROOT=/tmp/ergon-blob
    volumes:
      - /tmp/ergon-blob:/tmp/ergon-blob
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn ergon_core.core.api.app:app --host 0.0.0.0 --port 9000

  inngest-dev:
    # TODO: move off ``:latest`` to a pinned version once a maintainer
    # picks the target release. ``:latest`` means CI cache invalidates
    # silently whenever upstream pushes a new build.
    image: inngest/inngest:latest
    command: >
      inngest dev --no-discovery
      -u http://api:9000/api/inngest
    ports:
      - "8289:8288"
    environment:
      - INNGEST_DEV=1
    depends_on:
      api:
        condition: service_started
